#cloud-config
hostname: ${hostname}
fqdn: ${fqdn}
timezone: UTC

# Fix for "Blank Screen": Redirects boot output to the serial port (ttyS0)
bootcmd:
  - [ sh, -c, 'echo "GRUB_TERMINAL=\"serial console\"" >> /etc/default/grub' ]
  - [ sh, -c, 'echo "GRUB_SERIAL_COMMAND=\"serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1\"" >> /etc/default/grub' ]
  - [ sed, -i, 's/GRUB_CMDLINE_LINUX_DEFAULT="/GRUB_CMDLINE_LINUX_DEFAULT="console=tty0 console=ttyS0,115200n8 /', /etc/default/grub ]
  - [ update-grub ]

# Set up the primary user using values passed from Terraform
users:
  - name: ${username}
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: false
    passwd: ${password}
    ssh_authorized_keys:
      - ${sshkey}

# Ensures the password set above is actually applied
chpasswd:
  list: |
    ${username}:${password}
  expire: False

# Install required packages for K3s, Cilium, and Storage
packages:
  - curl
  - wget
  - qemu-guest-agent
  - nfs-common
  - open-iscsi

# System commands
runcmd:
  - [ systemctl, enable, --now, qemu-guest-agent ]
  - [ sysctl, -w, net.ipv4.conf.all.forwarding=1 ]